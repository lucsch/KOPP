name: Linux

on:
  push:

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff
        run: uv run ruff check .

      - name: Run unit tests
        run: uv run pytest
