name: Linux

on:
  push:

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-24.04
    env:
      UV_PYTHON: "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: >
          uv sync --group dev
          --find-links https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-24.04/
          --no-build-package wxPython

      - name: Run ruff
        run: uv run ruff check .

      - name: Run unit tests
        run: uv run pytest
