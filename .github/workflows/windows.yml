name: Windows

on:
  push:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build Windows app
    runs-on: windows-latest
    env:
      UV_PYTHON: "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Build app
        run: uv run python install/createapp.py Windows

      - name: Package app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts
          Compress-Archive -Path bin/dist/* -DestinationPath artifacts/kopp-windows.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kopp-windows
          path: artifacts/kopp-windows.zip

      - name: Upload release artifact
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" artifacts/kopp-windows.zip --clobber
